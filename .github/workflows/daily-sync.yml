name: Daily Chatwoot Sync

on:
  schedule:
    # 12:01 AM Ecuador (UTC-5) is 05:01 AM UTC
    - cron: '1 5 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Supabase Chatwoot Sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -fsS -X POST "$SUPABASE_URL/functions/v1/chatwoot-sync" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"window_hours":48}'
